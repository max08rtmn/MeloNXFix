name: Build MeloNX iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-ios:
    name: Build unsigned IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build MeloNX
        run: |
          xcodebuild \
            -project src/MeloNX/MeloNX.xcodeproj \
            -scheme MeloNX \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/MeloNX.app Payload/
          zip -r MeloNX-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MeloNX-unsigned-ipa
          path: MeloNX-unsigned.ipa
